<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fast Finder</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141414;--bg2:#000;--bg3:#2b2b2b;--bg4:#1f1f1f;--card:#181818;--ac:#e50914;--txt:#fff;--mu:#808080;--br:rgba(128,128,128,.2)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;padding-bottom:40px;-webkit-user-select:none;user-select:none}

/* topbar */
.tb{background:var(--bg2);padding:0 16px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--br);backdrop-filter:blur(10px)}
.logo{font-size:17px;font-weight:900;letter-spacing:1px;color:var(--ac);display:flex;align-items:center;gap:8px}
.ni{background:var(--ac);color:#fff;padding:2px 7px;border-radius:3px;font-size:16px;line-height:1.4;font-weight:900}

/* search zone — shared by both tabs */
.sz{padding:12px 16px 0;background:var(--bg);position:sticky;top:52px;z-index:90;box-shadow:0 4px 12px rgba(0,0,0,.3);overflow:visible}
.sr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sw{flex:1;min-width:0;display:flex;align-items:center;background:var(--bg3);border:1.5px solid var(--br);border-radius:12px;padding:0 6px 0 14px;gap:8px;min-height:38px;transition:border-color .18s}
.sw:focus-within{border-color:var(--ac)}
.si{flex:1;min-width:0;background:0 0;border:none;outline:none;color:var(--txt);caret-color:var(--ac);font-size:14px;font-weight:600;padding:6px 0;font-family:inherit;-webkit-tap-highlight-color:transparent}
.si::placeholder{color:var(--mu);font-weight:400}
.ssp{display:none;width:15px;height:15px;flex-shrink:0;border:2px solid var(--br);border-top-color:var(--ac);border-radius:50%;animation:ssSpin .6s linear infinite}
.sw.loading .ssp{display:inline-block}
@keyframes ssSpin{to{transform:rotate(360deg)}}

/* filters / cdd */
.fi{display:flex;gap:8px;padding-bottom:16px;overflow:visible}
.cw{flex:1;min-width:0;position:relative;user-select:none}
.cb{width:100%;box-sizing:border-box;background:var(--bg3);color:var(--txt);border:1.5px solid var(--br);border-radius:999px;padding:8px 28px 8px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:flex-start;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border-color .15s,box-shadow .15s;position:relative}
.cb:active,.cb.open{border-color:var(--ac);box-shadow:0 0 0 3px rgba(229,9,20,.12)}
.ca{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:9px;color:var(--mu);transition:transform .2s}
.cb.open .ca{transform:translateY(-50%) rotate(180deg)}
.cm{position:fixed;min-width:160px;background:var(--bg4);border:1.5px solid var(--br);border-radius:16px;overflow:hidden;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.55);display:none}
.cm.open{display:block;animation:cddIn .15s ease}
@keyframes cddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ci{display:flex;align-items:center;gap:10px;padding:12px 14px;font-size:13px;font-weight:700;color:var(--txt);cursor:pointer;transition:background .12s;border-bottom:1px solid var(--br)}
.ci:last-child{border-bottom:none}
.ci:active{background:var(--bg3)}
.ci.sel{color:var(--ac)}
.cr{width:16px;height:16px;border-radius:50%;border:2px solid var(--br);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.ci.sel .cr{border-color:var(--ac)}
.cd{width:7px;height:7px;border-radius:50%;background:var(--ac);display:none}
.ci.sel .cd{display:block}

/* pages */
.page{display:none}.page.active{display:block}

/* video results */
.main{padding:12px 12px 0}
.rg{display:grid;grid-template-columns:1fr;gap:4px;margin-bottom:24px}
@media(min-width:480px){.rg{grid-template-columns:repeat(2,1fr);gap:10px}}
.rg.mn .pb{display:none}

/* file card */
.fc{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--br);cursor:pointer;transition:border-color .2s}
.fc:active{border-color:rgba(229,9,20,.5);transform:scale(.96);transition:transform .1s}

/* shimmer — shared by poster-box & act-card poster */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sh{background:linear-gradient(90deg,var(--bg3) 0,#2a2a38 50%,var(--bg3) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite linear}

/* poster box (video) */
.pb{position:relative;padding-top:56.25%;overflow:hidden}
.pb{background:linear-gradient(90deg,var(--bg3) 0,#2a2a38 50%,var(--bg3) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite linear}
.fp{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.fp.on{opacity:1}
.pt{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:5px;padding:7px 8px}
.tc{background:rgba(0,0,0,.75);backdrop-filter:blur(8px);color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;letter-spacing:.8px;border:1px solid rgba(255,255,255,.14)}
.sc{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);color:#e0e0e0;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.08)}
.sp{margin-left:auto;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.4px;display:inline-flex;align-items:center;gap:4px}
.sp.primary{background:#14532d;color:#4ade80;border:1px solid #22c55e}
.sp.cloud{background:#1e3a5f;color:#93c5fd;border:1px solid #60a5fa}
.sp.archive{background:#7c2d12;color:#fdba74;border:1px solid #fb923c}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.primary .sd{background:#22c55e;box-shadow:0 0 4px #22c55e}
.cloud .sd{background:#60a5fa;box-shadow:0 0 4px #60a5fa}
.archive .sd{background:#fb923c;box-shadow:0 0 4px #fb923c}
.te{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.55);gap:6px;padding:10px;backdrop-filter:blur(5px)}
.te span{font-size:10px;color:var(--mu);text-align:center}
.rb{background:var(--ac);color:#fff;border:none;padding:5px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* text mode */
.ti{display:flex;align-items:center;gap:6px;padding:9px 10px 0;flex-wrap:wrap;margin-bottom:4px}
.tt{background:var(--bg4);color:var(--mu);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:.8px;border:1px solid var(--br)}
.ts{color:var(--mu);font-size:11px}
.tp{border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.4px;display:inline-flex;align-items:center;gap:4px}
.tp.primary{background:#14532d;color:#4ade80;border:1px solid #22c55e}
.tp.cloud{background:#1e3a5f;color:#93c5fd;border:1px solid #60a5fa}
.tp.archive{background:#7c2d12;color:#fdba74;border:1px solid #fb923c}

/* card body */
.fb{padding:9px 10px 11px}
.fn{color:var(--txt);font-size:12.5px;font-weight:600;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;transition:color .18s}
.fn:active{color:var(--ac)}

/* state box — shared */
.stb{text-align:center;padding:60px 20px;color:var(--mu);grid-column:1/-1;font-weight:500;line-height:1.6}
.sti{font-size:40px;margin-bottom:12px}
.stt{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}

/* pagination — shared */
.pg{display:none;justify-content:center;align-items:center;gap:12px;padding:16px 0 10px}
.pb2{background:var(--bg4);color:var(--txt);border:1px solid var(--br);border-radius:8px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,transform .15s}
.pb2:disabled{opacity:.35;cursor:not-allowed}
.pb2:not(:disabled):active{background:var(--ac);color:#fff;border-color:var(--ac);transform:scale(.93)}
.pi{font-size:12px;font-weight:700;color:var(--mu)}





/* card entrance animation */
@keyframes cardEnter{0%{opacity:0;transform:translateY(36px) scale(.93)}55%{opacity:1;transform:translateY(-5px) scale(1.015)}75%{transform:translateY(2px) scale(.998)}100%{opacity:1;transform:translateY(0) scale(1)}}
.ce{opacity:0}
.ce.cv{animation:cardEnter .6s cubic-bezier(.34,1.2,.64,1) forwards}

/* toast */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ac);color:#fff;padding:10px 22px;border-radius:30px;font-weight:700;font-size:13px;transition:.3s;z-index:1000;white-space:nowrap;box-shadow:0 4px 15px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* player sheet */
.ps{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none;opacity:0;transition:opacity .25s}
.ps.open{pointer-events:all;opacity:1}
.pbd{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)}
.pby{position:relative;background:#000;border-radius:18px 18px 0 0;width:100%;max-height:90vh;overflow:hidden;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.6,1);display:flex;flex-direction:column}
.ps.open .pby{transform:translateY(0)}
.ph{width:36px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:10px auto 6px;flex-shrink:0}
.ptl{font-size:12px;font-weight:700;color:#ccc;padding:0 14px 8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex-shrink:0}
.px{position:absolute;top:8px;right:12px;background:rgba(255,255,255,.12);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.ppl{width:100%;flex-shrink:0}
.ppl video{width:100%;display:block}
.plyr--video{--plyr-color-main:#e50914;--plyr-video-background:#000}
.plyr__control--overlaid,.plyr__control:hover{background:rgba(229,9,20,.9)!important}
.pa{display:flex;gap:10px;padding:12px 14px 20px;flex-shrink:0}
.pab{flex:1;padding:11px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;transition:opacity .15s}
.pab:active{opacity:.8}
.dl{background:var(--ac);color:#fff}
.cp{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
</style>
</head>
<body>

<div class="tb"><div class="logo"><span class="ni">F</span> FAST FINDER</div></div>

<!-- VIDEOS PAGE -->

  <div class="sz">
    <div class="sr">
      <div class="sw" id="qWrap"><input type="text" id="q" class="si" placeholder="Titles, genres, people…" enterkeyhint="search"><span class="ssp" id="qSpinner"></span></div>
    </div>
    <div class="fi">
      <div class="cw" id="cwCol">
        <div class="cb" id="cbCol" onclick="tCdd('Col')"><span id="clCol">📂 All</span><span class="ca">&#9660;</span></div>
        <div class="cm" id="cmCol">
          <div class="ci sel" data-val="all" onclick="setCdd(this,'Col','col')">📂 All Collections<div class="cr"><div class="cd"></div></div></div>
          <div class="ci" data-val="primary" onclick="setCdd(this,'Col','col')">🟢 Primary<div class="cr"><div class="cd"></div></div></div>
          <div class="ci" data-val="cloud" onclick="setCdd(this,'Col','col')">☁️ Cloud<div class="cr"><div class="cd"></div></div></div>
          <div class="ci" data-val="archive" onclick="setCdd(this,'Col','col')">📦 Archive<div class="cr"><div class="cd"></div></div></div>
        </div>
      </div>
      <div class="cw" id="cwMode">
        <div class="cb" id="cbMode" onclick="tCdd('Mode')"><span id="clMode">📸 TG Thumb</span><span class="ca">&#9660;</span></div>
        <div class="cm" id="cmMode">
          <div class="ci sel" data-val="tg" onclick="setCdd(this,'Mode','mode')">📸 TG Thumb<div class="cr"><div class="cd"></div></div></div>
          <div class="ci" data-val="none" onclick="setCdd(this,'Mode','mode')">⚡ Fast (Text)<div class="cr"><div class="cd"></div></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="rg" id="results">
      <div class="stb"><div class="sti">🔍</div><div class="stt">Search Karo</div><div>Movie ya series ka naam likhke search karo</div></div>
    </div>
    <div class="pg" id="pgBox">
      <button class="pb2" id="pBtn" onclick="prev()">◀ Prev</button>
      <span class="pi" id="pgInfo">Page 1</span>
      <button class="pb2" id="nBtn" onclick="next()">Next ▶</button>
    </div>
  </div>
</div>


<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PLAYER SHEET -->
<div class="ps" id="playerSheet">
  <div class="pbd" id="pbd"></div>
  <div class="pby">
    <div class="ph"></div>
    <button class="px" onclick="closePlayer()">✕</button>
    <div class="ptl" id="ptl"></div>
    <div class="ppl" id="ppl"><video id="pv2" playsinline controls></video></div>
    <div class="pa">
      <a id="dlBtn" href="#" class="pab dl">⬇ Download</a>
      <button onclick="copyLink()" class="pab cp">🔗 Copy Link</button>
    </div>
  </div>
</div>
<div id="cpToast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(200px);background:var(--ac);color:#fff;padding:10px 22px;border-radius:30px;font-weight:700;font-size:13px;transition:.3s;z-index:10000;white-space:nowrap;pointer-events:none;opacity:0">Link Copied!</div>



<script>
const tg=window.Telegram.WebApp;
tg.expand();tg.ready();
const ID=tg.initData||'';
const H={'X-Telegram-Init-Data':ID};

// state
let curQ='',curOff=0,nextOff='',curCol='all',curPage=1;
let searchReqId=0;
let pMode=localStorage.getItem('ff_mode')||'tg';
let plyr=null,streamUrl='';


// init mode
if(pMode==='none'){
  Q('#cmMode .ci').forEach(i=>i.classList.remove('sel'));
  Q1('#cmMode [data-val="none"]').classList.add('sel');
  Q1('#clMode').textContent='⚡ Fast (Text)';
  Q1('#results').classList.add('mn');
}

// helpers
function Q(s,p=document){return p.querySelectorAll(s)}
function Q1(s,p=document){return p.querySelector(s)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){let t=Q1('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function state(grid,pgId,icon,title,msg=''){
  Q1(grid).innerHTML=`<div class="stb"><div class="sti">${icon}</div><div class="stt">${title}</div><div>${msg}</div></div>`;
  Q1(pgId).style.display='none';
}
function stagger(el){
  let cards=Q('.ce',el),seen=0;
  if(!cards.length)return;
  let obs=new IntersectionObserver(en=>{
    en.forEach(e=>{
      if(!e.isIntersecting)return;
      let c=e.target,d=Math.min(seen++,10)*.08;
      c.style.animationDelay=d+'s';
      c.classList.add('cv');
      setTimeout(()=>{c.classList.remove('ce','cv');c.style.animationDelay='';},600+d*1000);
      obs.unobserve(c);
    });
  },{threshold:.08});
  cards.forEach(c=>obs.observe(c));
}

// CDD (custom dropdown)
function tCdd(id){
  let btn=Q1('#cb'+id),menu=Q1('#cm'+id),open=menu.classList.contains('open');
  Q('.cm').forEach(m=>m.classList.remove('open'));
  Q('.cb').forEach(b=>b.classList.remove('open'));
  if(!open){
    let r=btn.getBoundingClientRect();
    menu.style.top=(r.bottom+6)+'px';
    menu.style.left=r.left+'px';
    menu.classList.add('open');btn.classList.add('open');
  }
}
function setCdd(item,id,key){
  Q('#cm'+id+' .ci').forEach(i=>i.classList.remove('sel'));
  item.classList.add('sel');
  let val=item.dataset.val,lbl=item.childNodes[0].textContent.trim();
  Q1('#cl'+id).textContent=lbl;
  Q1('#cm'+id).classList.remove('open');Q1('#cb'+id).classList.remove('open');
  if(key==='col'){curCol=val;doSearch(0,true);}
  else{
    pMode=val;localStorage.setItem('ff_mode',val);
    Q1('#results').classList.toggle('mn',val==='none');
    doSearch(curOff,true);
  }
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.cw')){Q('.cm').forEach(m=>m.classList.remove('open'));Q('.cb').forEach(b=>b.classList.remove('open'));}
});



// video search
let qLiveTimer;
Q1('#q').addEventListener('input',()=>{
  clearTimeout(qLiveTimer);
  let val=Q1('#q').value.trim();
  if(val.length<2){
    searchReqId++;
    let qw=Q1('#qWrap');if(qw)qw.classList.remove('loading');
    doSearch(0,true);
    return;
  }
  qLiveTimer=setTimeout(()=>{doSearch(0);},350);
});
Q1('#q').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(qLiveTimer);doSearch(0);}});

function showErr(type,extra=''){
  let icon='❌',title='Error',msg=extra;
  if(type==='auth'){icon='🔒';title='Access Denied';msg='Premium required. Use /plan in bot PM.';}
  if(type==='rate'){icon='⏳';title='Thoda Ruko!';msg='Search throttled. Wait a moment.';}
  if(type==='init'){icon='⚠️';title='Security Error';msg='Only works inside official Telegram app.';}
  state('#results','#pgBox',icon,title,msg);
  tg.MainButton.hide();
}

function thumbErr(id){
  let b=Q1('#pb-'+id);if(!b)return;
  b.innerHTML=`<div class="te"><span>Thumbnail load nahi hua</span><button class="rb" onclick="retryThumb('${id}')">🔄 Retry</button></div>`;
}
function retryThumb(id){
  let b=Q1('#pb-'+id);if(!b)return;
  b.innerHTML=`<img src="/api/thumb?file_id=${id}&t=${Date.now()}" class="fp" onload="this.classList.add('on')" onerror="thumbErr('${id}')">`;
}

async function doSearch(off,allowEmpty){
  let q=Q1('#q').value.trim();
  if(!q && !allowEmpty)return toast('Kuch likho pehle!');
  if(!ID)return showErr('init');
  curQ=q;curOff=off;if(!off)curPage=1;
  if(q){sessionStorage.setItem('ff_ma_q',q);}else{sessionStorage.removeItem('ff_ma_q');}

  let myReq=++searchReqId;
  let qWrap=Q1('#qWrap');
  let loadTimer=setTimeout(()=>{
    if(myReq!==searchReqId)return;
    qWrap.classList.add('loading');
  },150);

  try{
    let r=await fetch(`/api/search?q=${encodeURIComponent(q)}&offset=${off}&col=${curCol}&mode=${pMode}`,{headers:H});
    if(myReq!==searchReqId){clearTimeout(loadTimer);qWrap.classList.remove('loading');return;}
    clearTimeout(loadTimer);
    qWrap.classList.remove('loading');
    if(r.status===403)return showErr('auth');
    if(r.status===429)return showErr('rate');
    if(!r.ok)return showErr('generic','Error '+r.status);
    let d=await r.json();
    if(myReq!==searchReqId)return;
    if(d.error){return showErr(d.error.includes('Unauthorized')?'auth':d.error.includes('fast')?'rate':'generic',d.error);}
    if(!d.results?.length){
      state('#results','#pgBox','🔎', q?'Kuch nahi mila':'Abhi tak koi file nahi', q?`"${esc(q)}" ke liye koi result nahi`:'');
      return;
    }
    let h='';
    d.results.forEach(f=>{
      let sc=['primary','cloud','archive'].includes((f.source||'').toLowerCase())?f.source.toLowerCase():'primary';
      let ph=pMode!=='none'
        ?`<div class="pb" id="pb-${f.file_id}"><img src="${f.tg_thumb}" class="fp" loading="lazy" onload="this.classList.add('on')" onerror="thumbErr('${f.file_id}')"><div class="pt"><span class="tc">${esc(f.type||'VIDEO')}</span><span class="sc">${esc(f.size||'')}</span><span class="sp ${sc}"><span class="sd"></span>${sc.toUpperCase()}</span></div></div>`
        :`<div class="ti"><span class="tt">${esc(f.type||'VIDEO')}</span><span class="ts">${esc(f.size||'')}</span><span class="tp ${sc}"><span class="sd"></span>${sc.toUpperCase()}</span></div>`;
      h+=`<div class="fc ce" onclick="openStream('${f.file_id}','${f.name.replace(/'/g,"\\'").replace(/`/g,'\\`')}')">${ph}<div class="fb"><div class="fn">${esc(f.name)}</div></div></div>`;
    });
    let res=Q1('#results');res.innerHTML=h;stagger(res);
    nextOff=d.next_offset;
    let pb=Q1('#pgBox');pb.style.display='flex';
    Q1('#pBtn').disabled=!off;Q1('#nBtn').disabled=!nextOff;
    Q1('#pgInfo').textContent='Page '+curPage;
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){if(myReq===searchReqId){qWrap.classList.remove('loading');showErr('generic','Connection fail. Dobara try karo.');}}
}

// player
async function openStream(id,name){
  toast('⏳ Loading...');
  try{
    let r=await fetch('/setup_stream',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({file_id:id,mode:'watch'})});
    if(r.status===403)return toast('🔒 Access denied');
    if(!r.ok)return toast('❌ Server error');
    let d=await r.json().catch(()=>({}));
    if(d.error)return toast('❌ '+d.error);
    let url=(d.url||'').replace('/watch/','/download/');
    if(!url)return toast('❌ Stream URL missing');
    openSheet(location.origin+url,name||id);
  }catch{toast('❌ Connection fail');}
}
function openSheet(url,title){
  streamUrl=url;
  Q1('#ptl').textContent=title;
  Q1('#dlBtn').href=url;
  if(plyr){try{plyr.destroy();}catch{}plyr=null;}
  let c=Q1('#ppl');c.innerHTML='<video id="pv2" playsinline controls></video>';
  Q1('#pv2').src=url;
  plyr=new Plyr('#pv2',{controls:['play-large','play','progress','current-time','mute','settings','fullscreen'],settings:['speed'],autoplay:true});
  plyr.on('enterfullscreen',()=>screen.orientation?.lock?.('landscape').catch(()=>{}));
  plyr.on('exitfullscreen',()=>screen.orientation?.unlock?.());
  Q1('#playerSheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePlayer(){
  Q1('#playerSheet').classList.remove('open');
  document.body.style.overflow='';
  if(plyr){try{plyr.pause();plyr.destroy();}catch{}plyr=null;}
  Q1('#ppl').innerHTML='<video id="pv2" playsinline controls></video>';
}
Q1('#pbd').addEventListener('click',function(e){if(e.target===this)closePlayer();});
function copyLink(){
  navigator.clipboard.writeText(streamUrl).catch(()=>{});
  let t=Q1('#cpToast');t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(200px)';},2500);
}

function next(){if(nextOff){curPage++;doSearch(nextOff);}}
function prev(){if(curPage>1){curPage--;doSearch(Math.max(0,curOff-21));}}

// initial load — restore last search this session, else show recent files
if(ID){
  let savedQ=sessionStorage.getItem('ff_ma_q');
  if(savedQ){Q1('#q').value=savedQ;doSearch(0);}else{doSearch(0,true);}
}
